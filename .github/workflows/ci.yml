name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint --if-present
    
    - name: Run Tests
      run: npm test --if-present

    - name: Validate Version Consistency
      run: node scripts/validate-version.js
      
    - name: Check Migrations Format
      run: |
        echo "Validating SQL migration naming..."
        ls migrations/ | grep -E "^[0-9]{8}_[a-z_]+\.sql$" || echo "Some migrations matched or none to check."
      shell: bash
